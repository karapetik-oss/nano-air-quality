<!DOCTYPE html>
<html>
<head>
    <title>Nano Air Quality Log</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #121212; color: white; padding: 10px; margin: 0; }
        .card { background: #1e1e1e; border-radius: 10px; padding: 15px; margin: 10px auto; max-width: 400px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .value { font-size: 1.5em; font-weight: bold; color: #4CAF50; }
        button { background-color: #007bff; color: white; border: none; padding: 12px 24px; font-size: 1em; border-radius: 5px; cursor: pointer; margin: 10px; }
        button:hover { background-color: #0056b3; }
        .btn-success { background-color: #4CAF50; }
        .grid { display: flex; justify-content: space-around; }
        canvas { max-width: 100%; height: auto; margin-top: 10px; }
        
        /* Checkbox Styling */
        .checkbox-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 5px; }
        .checkbox-grid label { background: #2c2c2c; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 0.9em; user-select: none; }
        .checkbox-grid input { margin-right: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <h2>Air Quality Station</h2>
    <button id="connectBtn">Connect to Nano</button>
    <button id="downloadBtn" style="display:none; background-color: #ff9800;">Download CSV</button>

    <div class="card" id="chartCard" style="display:none;">
        <div class="checkbox-grid" id="controls">
            <label><input type="checkbox" value="0"> Temp</label>
            <label><input type="checkbox" value="1"> Hum</label>
            <label><input type="checkbox" value="2" checked> TVOC</label>
            <label><input type="checkbox" value="3"> eCO2</label>
            <label><input type="checkbox" value="4"> PM1</label>
            <label><input type="checkbox" value="5" checked> PM2.5</label>
            <label><input type="checkbox" value="6"> PM10</label>
        </div>
        <canvas id="aqiChart"></canvas>
    </div>

    <div class="card"><div class="grid"><div><p>Temp</p><span class="value" id="temp">--</span>°C</div><div><p>Hum</p><span class="value" id="hum">--</span>%</div></div></div>
    <div class="card"><div class="grid"><div><p>TVOC</p><span class="value" id="tvoc">--</span> ppb</div><div><p>eCO2</p><span class="value" id="eco2">--</span> ppm</div></div></div>
    <div class="card"><div class="grid"><div><p>PM 1.0</p><span class="value" id="pm1">--</span></div><div><p>PM 2.5</p><span class="value" id="pm25">--</span></div><div><p>PM 10</p><span class="value" id="pm10">--</span></div></div></div>
