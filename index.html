<!DOCTYPE html>
<html>
<head>
    <title>Nano Air Quality Log</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #121212; color: white; padding: 10px; }
        .card { background: #1e1e1e; border-radius: 10px; padding: 15px; margin: 10px auto; max-width: 400px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .value { font-size: 1.5em; font-weight: bold; color: #4CAF50; }
        button { background-color: #007bff; color: white; border: none; padding: 12px 24px; font-size: 1em; border-radius: 5px; cursor: pointer; margin: 10px; }
        button:hover { background-color: #0056b3; }
        .btn-success { background-color: #4CAF50; }
        .grid { display: flex; justify-content: space-around; }
        canvas { max-width: 100%; height: auto; }
    </style>
</head>
<body>

    <h2>Air Quality Station</h2>
    <button id="connectBtn">Connect to Nano</button>
    <button id="downloadBtn" style="display:none; background-color: #ff9800;">Download CSV Log</button>

    <div class="card" id="chartCard" style="display:none;">
        <canvas id="aqiChart"></canvas>
    </div>

    <div class="card">
        <div class="grid">
            <div><p>Temp</p><span class="value" id="temp">--</span>°C</div>
            <div><p>Hum</p><span class="value" id="hum">--</span>%</div>
        </div>
    </div>

    <div class="card">
        <div class="grid">
            <div><p>TVOC</p><span class="value" id="tvoc">--</span> ppb</div>
            <div><p>eCO2</p><span class="value" id="eco2">--</span> ppm</div>
        </div>
    </div>

    <div class="card">
        <div class="grid">
            <div><p>PM 1.0</p><span class="value" id="pm1">--</span></div>
            <div><p>PM 2.5</p><span class="value" id="pm25">--</span></div>
            <div><p>PM 10</p><span class="value" id="pm10">--</span></div>
        </div>
    </div>

    <script>
        const SERVICE_UUID = "19b10000-e8f2-537e-4f6c-d104768a1214";
        const uuids = {
            temp: "19b10001-e8f2-537e-4f6c-d104768a1214",
            hum: "19b10002-e8f2-537e-4f6c-d104768a1214",
            tvoc: "19b10003-e8f2-537e-4f6c-d104768a1214",
            eco2: "19b10004-e8f2-537e-4f6c-d104768a1214",
            pm1: "19b10005-e8f2-537e-4f6c-d104768a1214",
            pm25: "19b10006-e8f2-537e-4f6c-d104768a1214",
            pm10: "19b10007-e8f2-537e-4f6c-d104768a1214"
        };

        // Storage for our current live values and historical log
        let currentData = { temp: 0, hum: 0, tvoc: 0, eco2: 0, pm1: 0, pm25: 0, pm10: 0 };
        let dataLog = [["Time", "Temp (C)", "Humidity (%)", "TVOC (ppb)", "eCO2 (ppm)", "PM 1.0", "PM 2.5", "PM 10"]];
        let isLogging = false;

        // Chart.js Setup
        const ctx = document.getElementById('aqiChart').getContext('2d');
        const aqiChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [], // Timestamps go here
                datasets: [
                    { label: 'TVOC (ppb)', borderColor: '#ff6384', data: [], tension: 0.4 },
                    { label: 'PM 2.5', borderColor: '#36a2eb', data: [], tension: 0.4 }
                ]
            },
            options: { responsive: true, scales: { x: { display: false } } } // Hide X axis to keep it clean
        });

        document.getElementById('connectBtn').addEventListener('click', async () => {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'Nano_Air_Quality' }, { name: 'Nano_AQI_V2' }],
                    optionalServices: [SERVICE_UUID]
                });

                document.getElementById('connectBtn').innerText = "Connecting...";

                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);

                async function setupSensor(key, uuid, isFloat) {
                    const characteristic = await service.getCharacteristic(uuid);
                    await characteristic.startNotifications();
                    characteristic.addEventListener('characteristicvaluechanged', (event) => {
                        let val = isFloat ? event.target.value.getFloat32(0, true) : event.target.value.getInt32(0, true);
                        if (isFloat) val = parseFloat(val.toFixed(1));
                        
                        // Update UI and our live data tracker
                        document.getElementById(key).innerText = val;
                        currentData[key] = val;
                    });
                }

                const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

                // Connect sequentially with our Goldilocks 250ms delay
                await setupSensor('temp', uuids.temp, true); await sleep(250);
                await setupSensor('hum', uuids.hum, true); await sleep(250);
                await setupSensor('tvoc', uuids.tvoc, false); await sleep(250);
                await setupSensor('eco2', uuids.eco2, false); await sleep(250);
                await setupSensor('pm1', uuids.pm1, false); await sleep(250);
                await setupSensor('pm25', uuids.pm25, false); await sleep(250);
                await setupSensor('pm10', uuids.pm10, false);

                // UI Updates
                document.getElementById('connectBtn').innerText = "Connected & Logging!";
                document.getElementById('connectBtn').classList.add("btn-success");
                document.getElementById('chartCard').style.display = "block";
                document.getElementById('downloadBtn').style.display = "inline-block";
                isLogging = true;

            } catch (error) {
                console.log(error);
                alert("Connection failed! Check Nano power and close other apps.");
                document.getElementById('connectBtn').innerText = "Try Again";
            }
        });

        // The Logging Loop: Records data and updates the graph every 5 seconds
        setInterval(() => {
            if (isLogging) {
                const timeStr = new Date().toLocaleTimeString();
                
                // 1. Update Graph
                aqiChart.data.labels.push(timeStr);
                aqiChart.data.datasets[0].data.push(currentData.tvoc);
                aqiChart.data.datasets[1].data.push(currentData.pm25);
                
                // Keep chart from getting too crowded (remove oldest point after 50 readings)
                if(aqiChart.data.labels.length > 50) {
                    aqiChart.data.labels.shift();
                    aqiChart.data.datasets[0].data.shift();
                    aqiChart.data.datasets[1].data.shift();
                }
                aqiChart.update();

                // 2. Add to CSV Log (Records everything, never deletes)
                dataLog.push([
                    timeStr, currentData.temp, currentData.hum, 
                    currentData.tvoc, currentData.eco2, 
                    currentData.pm1, currentData.pm25, currentData.pm10
                ]);
            }
        }, 5000);

        // CSV Download Function
        document.getElementById('downloadBtn').addEventListener('click', () => {
            let csvContent = "data:text/csv;charset=utf-8," + dataLog.map(e => e.join(",")).join("\n");
            var encodedUri = encodeURI(csvContent);
            var link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "air_quality_log.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });

    </script>
</body>
</html>
